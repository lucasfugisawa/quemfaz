services:
  postgres:
    image: postgres:16-alpine
    container_name: quemfaz_postgres_local
    environment:
      POSTGRES_DB: quemfaz
      POSTGRES_USER: quemfaz
      POSTGRES_PASSWORD: quemfaz
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quemfaz"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
